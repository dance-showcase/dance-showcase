<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>管理ページ</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}

.item {
  padding: 10px;
  margin: 5px;
  border: 1px solid #ccc;
}

button {
  margin: 3px;
  padding: 5px 10px;
}

.editBox {
  margin-top: 10px;
  padding: 10px;
  border: 1px dashed #aaa;
}

input {
  margin: 3px;
  padding: 5px;
}
</style>
</head>

<body>

<h1>管理ページ（幹部専用）</h1>

<!-- ログイン -->
<div id="login">
  <input type="password" id="pass" placeholder="パスワード">
  <button onclick="login()">ログイン</button>
</div>

<!-- 管理画面 -->
<div id="admin" style="display:none;">

  <h2>提出されたショーケース</h2>
  <div id="list"></div>

</div>

<script>

// 🔐 パスワード
const PASSWORD = "kanbu_only";

function login(){
  const input = document.getElementById("pass").value;

  if(input === PASSWORD){
    document.getElementById("login").style.display = "none";
    document.getElementById("admin").style.display = "block";
    render();
  } else {
    alert("パスワード違う！");
  }
}

// データ読み込み
let saved = localStorage.getItem("shows");
let data = saved ? JSON.parse(saved) : [];

// 表示
function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((item,i)=>{
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <b>${item.name}</b>

      <br>
      <button onclick="moveUp(${i})">↑</button>
      <button onclick="moveDown(${i})">↓</button>
      <button onclick="deleteItem(${i})">削除</button>
      <button onclick="toggleEdit(${i})">編集</button>

      <div id="edit-${i}" class="editBox" style="display:none;">
        <p>ショーケース名</p>
        <input id="name-${i}" value="${item.name}">

        <p>メンバー</p>
        <input id="members-${i}" value="${item.members}">

        <p>紹介文</p>
        <input id="desc-${i}" value="${item.desc}">

        <p>グループ（幹部が設定）</p>
        <input id="group-${i}" value="${item.group || ""}">

        <p>順番（幹部が設定）</p>
        <input id="order-${i}" type="number" value="${item.order || ""}">

        <br>
        <button onclick="saveEdit(${i})">保存</button>
      </div>
    `;

    list.appendChild(div);
  });
}

// 編集開く
function toggleEdit(i){
  const box = document.getElementById("edit-" + i);
  box.style.display = box.style.display === "none" ? "block" : "none";
}

// 編集保存
function saveEdit(i){
  data[i] = {
    name: document.getElementById("name-"+i).value,
    members: document.getElementById("members-"+i).value,
    desc: document.getElementById("desc-"+i).value,
    group: document.getElementById("group-"+i).value,
    order: Number(document.getElementById("order-"+i).value)
  };

  save();
  render();
}

// 並び替え
function moveUp(i){
  if(i === 0) return;
  [data[i], data[i-1]] = [data[i-1], data[i]];
  save();
  render();
}

function moveDown(i){
  if(i === data.length-1) return;
  [data[i], data[i+1]] = [data[i+1], data[i]];
  save();
  render();
}

// 削除
function deleteItem(i){
  data.splice(i,1);
  save();
  render();
}

// 保存
function save(){
  localStorage.setItem("shows", JSON.stringify(data));
}

</script>

</body>
</html>
