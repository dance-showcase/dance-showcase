<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ショーケース登録</title>

<style>
body { font-family: sans-serif; padding: 20px; }
input, textarea { display: block; margin: 10px 0; padding: 8px; width: 300px; }
textarea { height: 100px; }
button { padding: 10px 20px; cursor: pointer; }
#msg { margin-top: 15px; color: green; }
</style>
</head>

<body>

<h1>ショーケース登録フォーム</h1>

<input id="name" placeholder="ショーケース名">
<input id="members" placeholder="メンバー">
<textarea id="desc" placeholder="紹介文"></textarea>

<button onclick="submitData()">送信</button>

<div id="msg"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3TK6srZgRPVIPsrjZOmeNnpAdjzAn4i8",
  authDomain: "dance-294f2.firebaseapp.com",
  projectId: "dance-294f2",
  storageBucket: "dance-294f2.firebasestorage.app",
  messagingSenderId: "930917646427",
  appId: "1:930917646427:web:fe66d09cc5dd8ae7febf7e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.submitData = async function(){

  const name = document.getElementById("name").value;
  const members = document.getElementById("members").value;
  const desc = document.getElementById("desc").value;

  if(!name){
    alert("ショーケース名は必須！");
    return;
  }

  await addDoc(collection(db, "shows"), {
    name,
    members,
    desc,
    group: "",
    order: 0
  });

  document.getElementById("msg").innerText = "送信完了！";

  document.getElementById("name").value = "";
  document.getElementById("members").value = "";
  document.getElementById("desc").value = "";
};

</script>

</body>
</html>
